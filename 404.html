<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – JoyForth Foods</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #003d1f 0%, #006633 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 52px 44px;
      max-width: 480px; width: 100%;
      text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,.3);
    }
    img { height: 64px; object-fit: contain; margin: 0 auto 24px; display: block; }
    .num { font-size: 96px; font-weight: 900; color: #F4C542; line-height: 1; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 800; color: #007A3D; margin-bottom: 12px; }
    p  { font-size: 15px; color: #5a6a5f; line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #007A3D; color: #fff;
      padding: 14px 32px; border-radius: 50px;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    a:hover { background: #005a2c; }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/logo.png" alt="JoyForth Foods" />
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist or has been moved. Let's get you back to the good stuff.</p>
    <a href="index.html">← Go Back Home</a>
  </div>
</body>
</html>
